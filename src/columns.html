<html>
  <!DOCTYPE html>
  <html lang="en">
    <title>column test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.5.2/animate.min.css">
    <body class="bg-near-black relative near-white inter">
      <div id="nav"></div>
      <container class="flex flex-column vh-100 relative z-0">
        <header
          id="header"
          class="
            animated slideInDown
            tc
            click-fill
            w-100
            bb
            b--white-10
            hover-bg-yellow
            z-10
            shadow-hover
            hide-child
          "
          
        >
          <a
            id="a"
            class="near-white no-underline tracked small-caps mb0 f5 fw5"
          >
            menu bar thing
          </a>

        </header>
        <container
          data-name="container-content"
          class="flex flex-grow-1 flex-row-l tc flex-column z-0"
        >
          <section
            id="column-red"
            class="
              column
              click-fill
              animated
              fadeIn
              d2
              flex flex-grow-1
              items-end-l items-center
              pointer
              hover-bg-dark-red
              b--white-10
              br-l
              bb-m bb-s
              shadow-hover
            "
          >
            <p class="tl fw2 f2 w-100-m w-100-s tc pl3-l pb2-l ma0">One</p>
          </section>
          <section
            id="column-green"
            class="
              column
              click-fill
              animated
              fadeIn
              d4
              flex
              items-end-l items-center
              flex-grow-1
              pointer
              hover-bg-dark-green
              b--white-10
              br-l
              bb-m bb-s
              shadow-hover
            "
          >
            <p class="tl fw2 f2 w-100-m w-100-s tc pl3-l pb2-l ma0">Two</p>
          </section>
          <section
            id="column-blue"
            class="
              animated
              fadeIn
              d6
              column
              click-fill
              flex
              items-end-l items-center
              flex-grow-1
              pointer
              hover-bg-dark-blue
              shadow-hover
            "
          >
            <p class="tl fw2 f2 w-100-m w-100-s tc pl3-l pb2-l ma0">Three</p>
          </section>
        </container>
      </container>
      <script src="./index.js"></script>
      <!-- load javascript-->
    </body>
  </html>
</html>
